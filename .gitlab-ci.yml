# GitLab CI — custom Keep images for SVT/NEO
#
# Branch: svt/custom-patches
# Runner:  k8s (Kaniko builds — no Docker daemon required)
#
# Images produced:
#   harbor.support.aurora.svt.se/<namespace>/keep-frontend:<UPSTREAM_VERSION>-svt.<pipeline_iid>
#   harbor.support.aurora.svt.se/<namespace>/keep-frontend:dev   (auto, Flux watches this)
#   harbor.support.aurora.svt.se/<namespace>/keep-frontend:prod  (manual promotion)
#   harbor.support.aurora.svt.se/<namespace>/keep-backend:<UPSTREAM_VERSION>-svt.<pipeline_iid>
#   harbor.support.aurora.svt.se/<namespace>/keep-backend:dev
#   harbor.support.aurora.svt.se/<namespace>/keep-backend:prod
#
# Patches baked in:
#   frontend  — fix: alert fingerprint modal closes on re-fetch (alerts.tsx)
#   backend   — fix: grafana provider always sets optional fields
#             — fix: prometheus provider always sets value/instance/job as ""
#
# To add a new patch: commit the change, the next pipeline run picks it up.

stages:
  - test
  - build
  - tag

variables:
  # Match the upstream release this branch is based on.
  UPSTREAM_VERSION: "0.49.0"

  # Derived tag — e.g. 0.49.0-svt.12
  SVT_IMAGE_TAG: "${UPSTREAM_VERSION}-svt.${CI_PIPELINE_IID}"

  DOCKER_REGISTRY:  "harbor.support.aurora.svt.se"
  REGISTRY_MIRROR:  "docker-hub-proxy.support.aurora.svt.se"

  # Images land at harbor.support.aurora.svt.se/<namespace>/keep-frontend etc.
  FRONTEND_IMAGE:   "${DOCKER_REGISTRY}/${CI_PROJECT_NAMESPACE}/keep-frontend"
  BACKEND_IMAGE:    "${DOCKER_REGISTRY}/${CI_PROJECT_NAMESPACE}/keep-backend"

  # Kaniko cache repo (speeds up repeated layer builds).
  KANIKO_CACHE_REPO: "${DOCKER_REGISTRY}/${CI_PROJECT_NAMESPACE}/keep-cache"

# ── Frontend unit tests + typecheck ──────────────────────────────────────────
test-frontend:
  stage: test
  tags:
    - k8s
  image:
    name: node:20-alpine
    entrypoint: [""]
  only:
    - svt-main
  cache:
    key:
      files:
        - keep-ui/package-lock.json
    paths:
      - keep-ui/node_modules/
  script:
    - cd "${CI_PROJECT_DIR}/keep-ui"
    - npm ci --noproxy registry.npmjs.org --maxsockets 1
    - npx tsc --noEmit -p tsconfig.svt.json
    - npm test -- --ci --forceExit

.build-common: &build-common
  stage: build
  tags:
    - k8s
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  only:
    - svt-main
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}' \
        "${DOCKER_REGISTRY}" \
        "${AURORA_HARBOR_USER}" \
        "${AURORA_HARBOR_PASS}" \
        > /kaniko/.docker/config.json

.tag-common: &tag-common
  stage: tag
  tags:
    - k8s
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [""]
  only:
    - svt-main
  before_script:
    - crane auth login "${DOCKER_REGISTRY}" -u "${AURORA_HARBOR_USER}" -p "${AURORA_HARBOR_PASS}"

# ── Frontend ─────────────────────────────────────────────────────────────────
build-frontend:
  <<: *build-common
  script:
    - |
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}/keep-ui" \
        --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.ui" \
        --build-arg GIT_COMMIT_HASH="${CI_COMMIT_SHORT_SHA}" \
        --build-arg KEEP_VERSION="${UPSTREAM_VERSION}-svt" \
        --destination "${FRONTEND_IMAGE}:${SVT_IMAGE_TAG}" \
        --registry-mirror="${REGISTRY_MIRROR}" \
        --cache=true \
        --cache-repo="${KANIKO_CACHE_REPO}" \
        --snapshot-mode=redo \
        --use-new-run

# ── Backend ──────────────────────────────────────────────────────────────────
build-backend:
  <<: *build-common
  script:
    - |
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/docker/Dockerfile.api" \
        --build-arg GIT_COMMIT_HASH="${CI_COMMIT_SHORT_SHA}" \
        --destination "${BACKEND_IMAGE}:${SVT_IMAGE_TAG}" \
        --registry-mirror="${REGISTRY_MIRROR}" \
        --cache=true \
        --cache-repo="${KANIKO_CACHE_REPO}" \
        --snapshot-mode=redo \
        --use-new-run

# ── Tag: dev (automatic — Flux watches this tag) ─────────────────────────────
tag-dev:
  <<: *tag-common
  needs: [build-frontend, build-backend]
  script:
    - crane tag "${FRONTEND_IMAGE}:${SVT_IMAGE_TAG}" dev
    - crane tag "${BACKEND_IMAGE}:${SVT_IMAGE_TAG}" dev

# ── Tag: prod (manual promotion) ─────────────────────────────────────────────
tag-prod:
  <<: *tag-common
  needs: [build-frontend, build-backend]
  when: manual
  script:
    - crane tag "${FRONTEND_IMAGE}:${SVT_IMAGE_TAG}" prod
    - crane tag "${BACKEND_IMAGE}:${SVT_IMAGE_TAG}" prod
